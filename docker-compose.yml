version: '3.8'

services:
  stage1:
    build:
      context: ./stage1
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./stage1/data/models:/app/data/models:ro
      - ./shared:/app/shared
    environment:
      - APEX_WORKSPACE=/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  stage2:
    build:
      context: ./stage2
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./workspace:/workspace:ro
      - ./stage2/data:/app/data
      - ./shared:/app/shared
    environment:
      - APEX_WORKSPACE=/workspace
      - INFERENCE_API_URL=http://stage1:3000
    depends_on:
      - stage1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  stage2_data:
